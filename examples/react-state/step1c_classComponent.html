<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React JSX Example</title>
<!-- React and ReactDOM (Version 17 for compatibility) -->
<script src="https://unpkg.com/react@17/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
<!-- Babel for JSX transformation -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
    button {margin:5px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
class Button extends React.Component {
    constructor(props){
        super(props);   
    }
    
    render(){
        return (
            <button type="button">{this.props.label}</button>
        )
    }
}
//Class Counter
class Counter extends React.Component {
    constructor(props){
        super(props);
        this.state={counter:0};                      
        console.log(`this.props.value ${this.props.value}`);
        console.log(`this.state.counter ${this.state.counter}`);
    }

    componentDidMount(){
        this.setState({counter:1}, ()=>{console.log(`Update this.state.counter ${this.state.counter}`)});
    } 
    render(){
       return (
        <span>{this.state.counter}</span>
       ) 
    }
}
//Parent Class : App
class App extends React.Component {
    constructor(props){
        super(props);
    }
    render(){
       return (
        <React.Fragment>
        <Button label="Increase" />
        <Counter value="0" />
        </React.Fragment>
       ) 
    }
} 

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
