<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>useEffect — dependencies & document.title</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; color: #1f2937; }
        h1 { font-size: 20px; margin: 0 0 12px; }
        .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; max-width: 520px; background: #fff; }
        button { padding: 8px 14px; border: 1px solid #cbd5e1; background: #f1f5f9; border-radius: 6px; cursor: pointer; font: inherit; margin-right: 8px; }
        button:hover { background: #e2e8f0; }
        .muted { color: #64748b; font-size: 13px; margin-top: 10px; }
        code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// The dependency array decides WHEN an effect re-runs.
// - [] → once, after mount
// - [count] → after mount AND whenever count changes
// - omitted → after every render (usually not what you want)

const { useState, useEffect } = React;

function Counter() {
    const [count, setCount] = useState(0);
    const [runs, setRuns] = useState(0);

    useEffect(() => {
        document.title = `Count: ${count}`;
        setRuns((n) => n + 1); // bookkeeping: count how often the effect ran
        console.log("Effect ran with count =", count);
    }, [count]); // runs when count changes

    return (
        <div className="card">
            <h1>Tab title mirrors the count</h1>
            <p>Current count: <strong>{count}</strong></p>
            <p>Effect has run <strong>{runs}</strong> time(s).</p>
            <button onClick={() => setCount((c) => c + 1)}>+1</button>
            <button onClick={() => setCount((c) => c - 1)}>-1</button>
            <button onClick={() => setCount(0)}>reset</button>
            <p className="muted">
                Look at the browser tab — its title tracks <code>count</code>.
                The effect re-runs only when the value in <code>[count]</code> changes.
            </p>
        </div>
    );
}

ReactDOM.render(<Counter />, document.getElementById("root"));
</script>
</body>
</html>
