<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>
//User
class User {
    constructor(firstName, lastName, university = "Unistra", city = "Strasbourg") {
        this.firstName = firstName;
        this.lastName = lastName;
        this.university = university;
        this.city = city;
    }

    displayUser() {
        console.log(`Name: ${this.firstName} ${this.lastName}`);
        console.log(`University: ${this.university}, City: ${this.city}`);
    }

    createLogin() {
        return `${this.firstName[0]}${this.lastName}`.toLowerCase().slice(0, 9);
    }
}

const user1 = new User("Eric", "Christoffel", "Unistra");
user1.displayUser();
console.log(user1.createLogin());



</script>
