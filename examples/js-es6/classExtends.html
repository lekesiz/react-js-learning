<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>

class User {
    constructor(firstName, lastName, university = "Unistra", city = "Strasbourg") {
        this.firstName = firstName;
        this.lastName = lastName;
        this.university = university;
        this.city = city;
    }

    displayUser() {
        console.log(`Name: ${this.firstName} ${this.lastName}`);
        console.log(`University: ${this.university}, City: ${this.city}`);
    }

    createLogin() {
        return `${this.firstName[0]}${this.lastName}`.toLowerCase().slice(0, 9);
    }
}

//Teacher
class Teacher extends User {
    constructor(firstName, lastName, university, city, subject) {
        super(firstName, lastName, university, city);
        this.status = "Teacher";
        this.subject = subject;
    }

    displayUser() {
        super.displayUser(); // Call the parent method
        console.log(`Status: ${this.status}, Subject: ${this.subject}`);
    }
}

//Student
class Student extends User {
    constructor(firstName, lastName, university, city, speciality) {
        super(firstName, lastName, university, city);
        this.status = "Student";
        this.speciality = speciality;
    }

    displayUser() {
        super.displayUser();
        console.log(`Status: ${this.status}, Grade: ${this.speciality}`);
    }
}

const teacher1 = new Teacher("Eric", "Christoffel", "Unistra", "Strasbourg", "Javascript");
teacher1.displayUser();
console.log(teacher1.createLogin());

const student1 = new Student("Jules", "Féret", "Unistra", "Strasbourg", "Computer Science");
student1.displayUser();


</script>
</head>
<body>
    
</body>
</html>
