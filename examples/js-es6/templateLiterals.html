<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<section></section>  
<script>
/*
Template literals => more flexibility
back-ticks delimiters, 
writing code on multi-lines
insert a variable or expression using ${}
*/
let lastname="Christoffel";
let firstname="Eric";
let htmlCode=`<fieldset>
<legend>Contact</legend>
Lastname : ${lastname}<br>
Firstname : ${firstname}
</legend>`;
document.querySelector("section").insertAdjacentHTML("afterbegin",htmlCode); 

//document.body.insertAdjacentHTML("afterbegin",htmlCode);


</script> 

</body>
</html>
