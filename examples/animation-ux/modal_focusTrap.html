<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible modal — focus trap + Escape</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; color: #1f2937; }
        h1 { font-size: 20px; margin: 0 0 12px; }
        .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; max-width: 520px; background: #fff; }
        button { padding: 8px 14px; border: 1px solid #0369a1; background: #0369a1; color: #fff; border-radius: 6px; cursor: pointer; font: inherit; font-weight: 600; margin-right: 6px; }
        button.secondary { background: #fff; color: #0369a1; }
        .overlay {
            position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(3px);
            display: flex; align-items: center; justify-content: center; z-index: 10;
            animation: fadeIn 140ms ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: #fff; border-radius: 12px; padding: 22px 24px; min-width: 340px; max-width: 90vw;
            box-shadow: 0 20px 60px -10px rgba(0,0,0,0.4);
            animation: pop 180ms cubic-bezier(0.2, 0.9, 0.2, 1);
        }
        @keyframes pop {
            from { transform: translateY(-6px) scale(0.98); opacity: 0; }
            to   { transform: none; opacity: 1; }
        }
        .modal h2 { margin: 0 0 8px; font-size: 16px; }
        .modal p { margin: 0 0 14px; font-size: 14px; color: #475569; }
        .modal input { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .muted { color: #64748b; font-size: 13px; margin-top: 10px; }
        code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// An accessible modal needs 3 things people often skip:
//   1. Focus the first interactive element when opened (screen readers / keyboards)
//   2. Trap focus inside while it's open (Tab cycles)
//   3. Close on Escape; restore focus to the opener afterwards

const { useState, useEffect, useRef } = React;

const FOCUSABLE = 'a[href], button, input, textarea, select, [tabindex]:not([tabindex="-1"])';

function Modal({ open, onClose, children }) {
    const modalRef = useRef(null);
    const openerRef = useRef(null);

    useEffect(() => {
        if (!open) return;
        openerRef.current = document.activeElement;

        const first = modalRef.current.querySelector(FOCUSABLE);
        first?.focus();

        const onKey = (e) => {
            if (e.key === "Escape") { e.preventDefault(); onClose(); return; }
            if (e.key === "Tab") {
                const focusables = [...modalRef.current.querySelectorAll(FOCUSABLE)];
                if (focusables.length === 0) return;
                const first = focusables[0];
                const last  = focusables[focusables.length - 1];
                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault(); last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault(); first.focus();
                }
            }
        };
        window.addEventListener("keydown", onKey);
        return () => {
            window.removeEventListener("keydown", onKey);
            openerRef.current?.focus(); // restore focus to the opener
        };
    }, [open, onClose]);

    if (!open) return null;
    return (
        <div className="overlay" onClick={onClose} role="presentation">
            <div role="dialog" aria-modal="true" aria-labelledby="m-title"
                 className="modal" ref={modalRef}
                 onClick={(e) => e.stopPropagation()}>
                {children}
            </div>
        </div>
    );
}

function App() {
    const [open, setOpen] = useState(false);
    return (
        <div className="card">
            <h1>Accessible modal</h1>
            <button onClick={() => setOpen(true)}>Open modal</button>

            <Modal open={open} onClose={() => setOpen(false)}>
                <h2 id="m-title">Create a team</h2>
                <p>Pick a name and invite your first teammate.</p>
                <input placeholder="Team name" />
                <input placeholder="teammate@email.com" style={{ marginTop: 8 }} />
                <div className="actions">
                    <button className="secondary" onClick={() => setOpen(false)}>Cancel</button>
                    <button onClick={() => setOpen(false)}>Create</button>
                </div>
            </Modal>

            <p className="muted">
                Focus auto-lands on the first input. Try <code>Tab</code> / <code>Shift+Tab</code>
                — focus cycles inside the modal. Press <code>Esc</code> or click the backdrop to close;
                focus returns to the opening button.
            </p>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
