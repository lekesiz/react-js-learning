<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>useTransition — urgent vs non-urgent updates</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; color: #1f2937; }
        h1 { font-size: 20px; margin: 0 0 12px; }
        .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; max-width: 560px; background: #fff; }
        .tabs { display: flex; gap: 6px; margin-bottom: 10px; }
        .tabs button { padding: 6px 12px; border: 1px solid #cbd5e1; background: #f8fafc; color: #334155; border-radius: 999px; cursor: pointer; font: inherit; font-size: 13px; font-weight: 500; }
        .tabs button.active { background: #0369a1; color: #fff; border-color: #0369a1; }
        .tabs button[disabled] { opacity: 0.6; cursor: progress; }
        .row { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .loading { background: #eff6ff; color: #1d4ed8; padding: 6px 10px; border-radius: 6px; font-size: 13px; margin-top: 6px; display: inline-block; }
        .muted { color: #64748b; font-size: 13px; margin-top: 10px; }
        code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// React 18: startTransition marks a state update as "non-urgent" — React
// can interrupt it to handle an urgent one (like typing or another click).
// isPending tells you whether the transition is still catching up.

const { useState, useTransition } = React;

const TABS = ["posts", "comments", "users"];

function makeItems(tab, n = 2000) {
    return Array.from({ length: n }, (_, i) => tab + " row #" + i);
}

function HeavyList({ items }) {
    // Make each render deliberately slow
    const t0 = performance.now();
    while (performance.now() - t0 < 120) {} // ~120ms of busy work
    return (
        <div style={{ maxHeight: 220, overflowY: "auto", marginTop: 8 }}>
            {items.slice(0, 80).map((it, i) => (
                <div key={i} className="row">{it}</div>
            ))}
        </div>
    );
}

function App() {
    const [tab, setTab] = useState("posts");
    const [items, setItems] = useState(() => makeItems("posts"));
    const [isPending, startTransition] = useTransition();

    function switchTab(next) {
        setTab(next);                    // urgent: update the tab highlight
        startTransition(() => {          // non-urgent: swap the heavy list
            setItems(makeItems(next));
        });
    }

    return (
        <div className="card">
            <h1>useTransition — keep the UI responsive during heavy updates</h1>

            <div className="tabs">
                {TABS.map((t) => (
                    <button key={t}
                            className={tab === t ? "active" : ""}
                            disabled={isPending && tab === t}
                            onClick={() => switchTab(t)}>
                        {t}
                    </button>
                ))}
            </div>

            {isPending && <div className="loading">Updating list…</div>}

            <HeavyList items={items} />

            <p className="muted">
                Click tabs rapidly. The highlight changes <em>immediately</em> (urgent),
                while the heavy list swap is marked non-urgent via
                <code>startTransition</code>, and <code>isPending</code> gives you a
                spinner surface.
            </p>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
